{% extends 'base.html' %} 

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow-lg border-0" style="border-radius: 20px; background: #ffffff;">
            <div class="text-center mb-4">
                <div class="bg-light d-inline-block p-3 rounded-circle mb-2 shadow-sm">
                    <i class="fas fa-user-shield fa-2x text-primary"></i>
                </div>
                <h3 class="fw-bold text-dark">Student Login</h3>
                <p class="text-muted small">Apne account mein login karein</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="alert alert-danger py-2 small border-0 text-center" style="border-radius: 10px;">
                    <i class="fas fa-exclamation-circle me-1"></i> Invalid username or password.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-bold small">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted small"></i></span>
                        <input type="text" name="username" class="form-control border-start-0" placeholder="Enter Username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-muted small"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Enter Password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow mt-2" style="background-color: #1a237e; border-radius: 10px; border: none;">
                    LOGIN & CONTINUE <i class="fas fa-arrow-right ms-2 small"></i>
                </button>
            </form>
            
            <div class="mt-4 pt-3 border-top text-center">
                <p class="mb-0 text-muted small">Account nahi hai? 
                    <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none ms-1">
                        Register Here <i class="fas fa-external-link-alt ms-1 x-small"></i>
                    </a>
                </p>
                <p class="mt-2 x-small text-muted"><i class="fas fa-lock me-1"></i> Secure 256-bit Connection</p>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control {
        border-radius: 10px;
        font-size: 0.9rem;
    }
    .form-control:focus {
        border-color: #1a237e;
        box-shadow: none;
        background-color: #fcfcfc;
    }
    .input-group-text {
        border-radius: 10px 0 0 10px;
        background-color: #f8f9fa;
    }
    .x-small { font-size: 0.75rem; }
</style>
{% endblock %}
